<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>Vakondütő</title>
  <link rel="stylesheet" href="vu.css">
</head>
<body>

    <h1>Vakondütő</h1>
    <p>Pontszám: <span id="score">0</span></p>

    <button id="startBtn" class="bttn">Start</button>

    <div class="grid">
        <div class="hole" id="0"></div>
        <div class="hole" id="1"></div>
        <div class="hole" id="2"></div>
        <div class="hole" id="3"></div>
        <div class="hole" id="4"></div>
        <div class="hole" id="5"></div>
        <div class="hole" id="6"></div>
        <div class="hole" id="7"></div>
        <div class="hole" id="8"></div>
    </div>
    <div>
        <button id="stopBtn" class="bttn">Játék befejezése</button>
    </div>

    <script src="vu.js"></script>
</body>
</html>
